server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + health to the backend so the browser stays same-origin.
    # A variable in proxy_pass defers DNS resolution to request time.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend http://backend-api:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location = /health {
        set $backend http://backend-api:8000;
        proxy_pass $backend/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
