name: elasticgpt

x-worker-base: &worker-base
  build: ./backend
  env_file: .env
  environment: &worker-env
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ELASTICSEARCH_URL: http://elasticsearch:9200
    DATABASE_URL: postgresql+psycopg2://elasticgpt:elasticgpt@postgres:5432/elasticgpt
    REDIS_URL: redis://redis:6379/0
    VAULT_ROOT: /vault
  volumes:
    - ./sample-vault:/vault/sample
  depends_on:
    kafka: {condition: service_healthy}
    elasticsearch: {condition: service_healthy}
    postgres: {condition: service_healthy}
    redis: {condition: service_healthy}
  command: ["python", "worker.py"]
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import os,time,sys; p='/tmp/worker_healthy'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < 30 else 1)\""]
    interval: 15s
    timeout: 5s
    retries: 10
  restart: unless-stopped

services:
  # ---------------- Infrastructure ----------------
  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 30

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: elasticgpt
      POSTGRES_PASSWORD: elasticgpt
      POSTGRES_DB: elasticgpt
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elasticgpt"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---------------- Application ----------------
  backend-api:
    build: ./backend
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      DATABASE_URL: postgresql+psycopg2://elasticgpt:elasticgpt@postgres:5432/elasticgpt
      REDIS_URL: redis://redis:6379/0
      VAULT_ROOT: /vault
    volumes:
      - ./sample-vault:/vault/sample
    ports:
      - "8000:8000"
    depends_on:
      kafka: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ---------------- Workers ----------------
  worker-parser:
    <<: *worker-base
    environment: {<<: *worker-env, WORKER_TYPE: parser}
  worker-chunker:
    <<: *worker-base
    environment: {<<: *worker-env, WORKER_TYPE: chunker}
  worker-embedding:
    <<: *worker-base
    environment: {<<: *worker-env, WORKER_TYPE: embedding}
  worker-indexing:
    <<: *worker-base
    environment: {<<: *worker-env, WORKER_TYPE: indexing}
  worker-knowledge:
    <<: *worker-base
    environment: {<<: *worker-env, WORKER_TYPE: knowledge}
  worker-note-update:
    <<: *worker-base
    environment: {<<: *worker-env, WORKER_TYPE: note_update}

  # ---------------- Vault Watcher ----------------
  vault-watcher:
    <<: *worker-base
    command: ["python", "-m", "app.obsidian.watcher_main"]
    environment: {<<: *worker-env}

  # ---------------- Mock Web UI ----------------
  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      backend-api: {condition: service_started}
